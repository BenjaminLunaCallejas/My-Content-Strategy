<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Planificador Estratégico de Contenido</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .tag { display: inline-flex; align-items: center; background-color: #e2e8f0; color: #1e293b; padding: 0.25rem 0.75rem; border-radius: 9999px; margin: 0.25rem; font-size: 0.875rem; }
        .tag button { margin-left: 0.5rem; color: #ef4444; font-weight: bold; }
        .task-done { text-decoration: line-through; opacity: 0.6; }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 font-sans antialiased">

    <div class="flex h-screen overflow-hidden">
        <aside class="w-64 bg-slate-900 text-white flex flex-col shadow-lg">
            <div class="p-6">
                <h1 class="text-2xl font-bold tracking-wider text-indigo-400">Content<br>Core Hub</h1>
            </div>
            <nav class="flex-1 px-4 space-y-2">
                <button onclick="switchTab('estrategia')" class="w-full text-left px-4 py-3 rounded-lg bg-slate-800 hover:bg-slate-700 transition" id="btn-estrategia">1. Estrategia y Marca</button>
                <button onclick="switchTab('notas')" class="w-full text-left px-4 py-3 rounded-lg hover:bg-slate-700 transition" id="btn-notas">2. Notas y Tendencias</button>
                <button onclick="switchTab('ideas')" class="w-full text-left px-4 py-3 rounded-lg hover:bg-slate-700 transition" id="btn-ideas">3. Repositorio y Guiones</button>
                <button onclick="switchTab('planificador')" class="w-full text-left px-4 py-3 rounded-lg hover:bg-slate-700 transition" id="btn-planificador">4. Planificador</button>
            </nav>
        </aside>

        <main class="flex-1 overflow-y-auto p-8">
            
            <!-- SECCIÓN 1: ESTRATEGIA -->
            <section id="estrategia" class="tab-content active max-w-4xl mx-auto bg-white p-8 rounded-xl shadow-sm border border-gray-100">
                <h2 class="text-3xl font-bold mb-6 text-gray-800 border-b pb-2">Identidad y Estrategia Central</h2>
                
                <div class="grid grid-cols-1 gap-6 mb-6">
                    <div>
                        <label class="block text-sm font-semibold text-gray-600 mb-2">Tema Central</label>
                        <input type="text" id="temaCentral" placeholder="Ej. Emprendimiento STEAM y Ciencia" class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none">
                    </div>
                    
                    <div>
                        <label class="block text-sm font-semibold text-gray-600 mb-2">Arquetipos de Marca (Selecciona mínimo 2)</label>
                        <div id="arquetiposContainer" class="grid grid-cols-2 md:grid-cols-4 gap-2 p-4 border rounded-lg bg-gray-50">
                            <!-- Los arquetipos se generarán por JS -->
                        </div>
                        <div id="arquetipoDescripcion" class="mt-4 p-4 bg-indigo-50 border-l-4 border-indigo-500 text-sm text-indigo-900 italic hidden">
                            <!-- Descripción dinámica -->
                        </div>
                    </div>
                </div>

                <div class="mb-6">
                    <label class="block text-sm font-semibold text-gray-600 mb-2">Ejes Transversales (Escribe y presiona Enter)</label>
                    <input type="text" id="inputEjes" placeholder="Agregar eje..." class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none mb-2">
                    <div id="listaEjes" class="flex flex-wrap"></div>
                </div>

                <div class="mb-6">
                    <label class="block text-sm font-semibold text-gray-600 mb-2">Pilares de Contenido (Escribe y presiona Enter)</label>
                    <input type="text" id="inputPilares" placeholder="Agregar pilar..." class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none mb-2">
                    <div id="listaPilares" class="flex flex-wrap"></div>
                </div>

                <button onclick="guardarEstrategia()" class="bg-indigo-600 text-white px-6 py-3 rounded-lg font-semibold hover:bg-indigo-700 transition">Guardar Estrategia</button>
                <span id="estrategia-msg" class="ml-4 text-green-600 font-semibold hidden">¡Estrategia guardada!</span>
            </section>

            <!-- SECCIÓN 2: NOTAS Y TAREAS -->
            <section id="notas" class="tab-content max-w-5xl mx-auto">
                <h2 class="text-3xl font-bold mb-6 text-gray-800 border-b pb-2">Panel de Notas y Tendencias</h2>
                
                <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                    <!-- Columna 1: Ideas Crudas -->
                    <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-100 flex flex-col">
                        <h3 class="text-xl font-bold text-gray-700 mb-4">Ideas Crudas</h3>
                        <div class="flex gap-2 mb-4">
                            <input type="text" id="inputTarea_ideas" class="flex-1 p-2 border rounded text-sm" placeholder="Nueva idea...">
                            <button onclick="addTask('ideas')" class="bg-indigo-500 text-white px-3 rounded text-sm">+</button>
                        </div>
                        <ul id="lista_ideas" class="space-y-2 text-sm"></ul>
                    </div>
                    
                    <!-- Columna 2: Audios -->
                    <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-100 flex flex-col">
                        <h3 class="text-xl font-bold text-gray-700 mb-4">Audios y Ref.</h3>
                        <div class="flex gap-2 mb-4">
                            <input type="text" id="inputTarea_audios" class="flex-1 p-2 border rounded text-sm" placeholder="Enlace o nombre...">
                            <button onclick="addTask('audios')" class="bg-indigo-500 text-white px-3 rounded text-sm">+</button>
                        </div>
                        <ul id="lista_audios" class="space-y-2 text-sm"></ul>
                    </div>

                    <!-- Columna 3: Tendencias -->
                    <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-100 flex flex-col">
                        <h3 class="text-xl font-bold text-gray-700 mb-4">Tendencias</h3>
                        <div class="flex gap-2 mb-4">
                            <input type="text" id="inputTarea_tendencias" class="flex-1 p-2 border rounded text-sm" placeholder="Tendencia actual...">
                            <button onclick="addTask('tendencias')" class="bg-indigo-500 text-white px-3 rounded text-sm">+</button>
                        </div>
                        <ul id="lista_tendencias" class="space-y-2 text-sm"></ul>
                    </div>
                </div>
            </section>

            <!-- SECCIÓN 3: IDEAS Y GUIONES (ORIGINAL) -->
            <section id="ideas" class="tab-content max-w-5xl mx-auto">
                <div class="bg-white p-8 rounded-xl shadow-sm border border-gray-100 mb-8">
                    <h2 class="text-3xl font-bold mb-6 text-gray-800 border-b pb-2">Generador de Ideas y Guiones</h2>
                    
                    <div class="grid grid-cols-1 md:grid-cols-5 gap-4 mb-4">
                        <div class="md:col-span-5">
                            <label class="block text-sm font-semibold text-gray-600 mb-2">Título de la Idea</label>
                            <input type="text" id="ideaTitulo" placeholder="Ej. ¿Cómo estructurar un proyecto de investigación?" class="w-full p-3 border rounded-lg outline-none">
                        </div>
                        
                        <div>
                            <label class="block text-sm font-semibold text-gray-600 mb-2">Formato</label>
                            <select id="ideaFormato" class="w-full p-3 border rounded-lg outline-none">
                                <option value="Short Content">Short Content (Reel/TikTok/Shorts)</option>
                                <option value="Long Form">Long Form (YouTube/Podcast)</option>
                                <option value="Carrusel">Carrusel (Instagram/LinkedIn)</option>
                                <option value="Hilo">Hilo (X/Threads)</option>
                            </select>
                        </div>

                        <div>
                            <label class="block text-sm font-semibold text-gray-600 mb-2">Tipo</label>
                            <select id="ideaTipo" class="w-full p-3 border rounded-lg outline-none">
                                <option value="Divulgación">Divulgación Científica</option>
                                <option value="Entrevista">Entrevista / Colaboración</option>
                                <option value="Recomendación">Recomendación (Herramientas)</option>
                                <option value="Tutorial">Tutorial Técnico</option>
                                <option value="Vlog/Lifestyle">Vlog / Documental</option>
                            </select>
                        </div>

                        <div>
                            <label class="block text-sm font-semibold text-gray-600 mb-2">Objetivo Estratégico</label>
                            <select id="ideaObjetivo" class="w-full p-3 border rounded-lg outline-none">
                                <option value="Educar (Valor)">Educar (Aportar Valor)</option>
                                <option value="Inspirar (Presencia)">Inspirar (Generar Conexión)</option>
                                <option value="Autoridad (Demostrar)">Autoridad (Demostrar Expertise)</option>
                                <option value="Convertir (Venta/Lead)">Convertir (Call to Action / Inscripción)</option>
                                <option value="Entretener (Alcance)">Entretener (Maximizar Alcance)</option>
                            </select>
                        </div>

                        <div>
                            <label class="block text-sm font-semibold text-gray-600 mb-2">Fecha de Publicación</label>
                            <input type="date" id="ideaFecha" class="w-full p-3 border rounded-lg outline-none">
                        </div>

                        <div>
                            <label class="block text-sm font-semibold text-gray-600 mb-2">Hora</label>
                            <input type="time" id="ideaHora" class="w-full p-3 border rounded-lg outline-none">
                        </div>
                    </div>

                    <div class="mb-4">
                        <label class="block text-sm font-semibold text-gray-600 mb-2">Estructura del Guion</label>
                        <textarea id="ideaGuion" rows="5" placeholder="1. Gancho... 2. Desarrollo... 3. CTA..." class="w-full p-3 border rounded-lg outline-none"></textarea>
                    </div>

                    <div class="mb-4">
                        <label class="block text-sm font-semibold text-gray-600 mb-2">Copy</label>
                        <textarea id="ideaCopy" rows="3" placeholder="Texto de la publicación..." class="w-full p-3 border rounded-lg outline-none"></textarea>
                    </div>

                    <div class="mb-6">
                        <label class="block text-sm font-semibold text-gray-600 mb-2">Hashtags</label>
                        <input type="text" id="ideaHashtags" placeholder="#Ciencia #STEAM" class="w-full p-3 border rounded-lg outline-none">
                    </div>

                    <button onclick="guardarIdea()" class="bg-indigo-600 text-white px-6 py-3 rounded-lg font-semibold hover:bg-indigo-700 transition">Guardar Guion Estructurado</button>
                </div>

                <div id="listaIdeas" class="grid grid-cols-1 gap-4"></div>
            </section>

            <!-- SECCIÓN 4: PLANIFICADOR (ORIGINAL) -->
            <section id="planificador" class="tab-content max-w-5xl mx-auto">
                <h2 class="text-3xl font-bold mb-6 text-gray-800 border-b pb-2">Planificador Cronológico</h2>
                <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-100">
                    <div id="calendarioGrid" class="space-y-4"></div>
                </div>
            </section>

        </main>
    </div>

    <script>
        // --- DATOS Y CONSTANTES ---
        const arquetiposInfo = {
            "El Sabio": "Enfoque en la verdad, el análisis y la pedagogía. Ideal para tutoriales y datos.",
            "El Bufón": "Enfoque en el humor, la irreverencia y la ligereza. Ideal para viralidad y cercanía.",
            "El Creador": "Enfoque en la innovación y la visión. Formatos creativos y procesos (BTS).",
            "El Héroe": "Enfoque en la superación y el logro. Historias de éxito y retos.",
            "El Rebelde": "Enfoque en la disrupción. Críticas a lo convencional y nuevas formas.",
            "El Mago": "Enfoque en la transformación rápida y 'efectos wow'.",
            "El Amigo": "Enfoque en la empatía y comunidad. Vlogs y charlas directas.",
            "El Explorador": "Enfoque en la libertad y descubrimiento de nuevas herramientas."
        };

        let ideas = JSON.parse(localStorage.getItem('contentIdeas')) || [];
        let ejesTags = JSON.parse(localStorage.getItem('ejesTags')) || [];
        let pilaresTags = JSON.parse(localStorage.getItem('pilaresTags')) || [];
        let tasks = JSON.parse(localStorage.getItem('contentTasks')) || { ideas: [], audios: [], tendencias: [] };

        // --- SISTEMA DE NAVEGACIÓN ---
        function switchTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
            document.querySelectorAll('aside button').forEach(btn => {
                btn.classList.remove('bg-slate-800');
                btn.classList.add('hover:bg-slate-700');
            });
            document.getElementById(tabId).classList.add('active');
            document.getElementById('btn-' + tabId).classList.add('bg-slate-800');
            
            if(tabId === 'ideas') renderIdeas();
            if(tabId === 'planificador') renderCalendario();
            if(tabId === 'notas') renderTasks();
        }

        // --- MÓDULO: ARQUETIPOS Y ESTRATEGIA ---
        function initArquetipos() {
            const container = document.getElementById('arquetiposContainer');
            const seleccionados = JSON.parse(localStorage.getItem('arquetiposSeleccionados')) || [];
            
            Object.keys(arquetiposInfo).forEach(arq => {
                const checked = seleccionados.includes(arq) ? 'checked' : '';
                container.innerHTML += `
                    <label class="flex items-center space-x-2 text-sm cursor-pointer hover:text-indigo-600">
                        <input type="checkbox" value="${arq}" ${checked} onchange="updateArquetipoDesc()" class="arq-checkbox rounded text-indigo-600 focus:ring-indigo-500">
                        <span>${arq}</span>
                    </label>
                `;
            });
            updateArquetipoDesc();
        }

        function updateArquetipoDesc() {
            const selected = Array.from(document.querySelectorAll('.arq-checkbox:checked')).map(cb => cb.value);
            const descBox = document.getElementById('arquetipoDescripcion');
            
            if(selected.length >= 2) {
                descBox.classList.remove('hidden');
                let descText = `<strong>Perfil Híbrido (${selected.join(' + ')}):</strong> `;
                selected.forEach(arq => descText += `<br>• ${arquetiposInfo[arq]}`);
                descBox.innerHTML = descText;
            } else {
                descBox.classList.add('hidden');
            }
        }

        // --- MÓDULO: ETIQUETAS (TAGS) ---
        function setupTagsInput(inputId, listId, arrayVar, storageKey) {
            const input = document.getElementById(inputId);
            input.addEventListener('keypress', (e) => {
                if(e.key === 'Enter' && input.value.trim() !== '') {
                    arrayVar.push(input.value.trim());
                    input.value = '';
                    renderTags(listId, arrayVar, storageKey);
                }
            });
        }

        function renderTags(listId, arrayVar, storageKey) {
            const container = document.getElementById(listId);
            container.innerHTML = '';
            arrayVar.forEach((tag, index) => {
                const tagEl = document.createElement('div');
                tagEl.className = 'tag';
                tagEl.innerHTML = `${tag} <button onclick="removeTag('${listId}', ${index}, '${storageKey}')">x</button>`;
                container.appendChild(tagEl);
            });
            localStorage.setItem(storageKey, JSON.stringify(arrayVar));
        }

        function removeTag(listId, index, storageKey) {
            if(listId === 'listaEjes') {
                ejesTags.splice(index, 1);
                renderTags(listId, ejesTags, storageKey);
            } else {
                pilaresTags.splice(index, 1);
                renderTags(listId, pilaresTags, storageKey);
            }
        }

        function guardarEstrategia() {
            localStorage.setItem('temaCentral', document.getElementById('temaCentral').value);
            const selectedArqs = Array.from(document.querySelectorAll('.arq-checkbox:checked')).map(cb => cb.value);
            localStorage.setItem('arquetiposSeleccionados', JSON.stringify(selectedArqs));
            
            const msg = document.getElementById('estrategia-msg');
            msg.classList.remove('hidden');
            setTimeout(() => msg.classList.add('hidden'), 2000);
        }

        // --- MÓDULO: TAREAS (NOTAS) ---
        function addTask(category) {
            const input = document.getElementById(`inputTarea_${category}`);
            if(input.value.trim() === '') return;
            
            tasks[category].push({ text: input.value, done: false });
            input.value = '';
            renderTasks();
            saveTasks();
        }

        function toggleTask(category, index) {
            tasks[category][index].done = !tasks[category][index].done;
            renderTasks();
            saveTasks();
        }

        function removeTask(category, index) {
            tasks[category].splice(index, 1);
            renderTasks();
            saveTasks();
        }

        function renderTasks() {
            ['ideas', 'audios', 'tendencias'].forEach(cat => {
                const list = document.getElementById(`lista_${cat}`);
                list.innerHTML = '';
                tasks[cat].forEach((task, index) => {
                    list.innerHTML += `
                        <li class="flex justify-between items-center p-2 bg-gray-50 rounded group">
                            <span onclick="toggleTask('${cat}', ${index})" class="cursor-pointer ${task.done ? 'task-done' : ''}">${task.text}</span>
                            <button onclick="removeTask('${cat}', ${index})" class="text-red-400 opacity-0 group-hover:opacity-100 transition">×</button>
                        </li>
                    `;
                });
            });
        }

        function saveTasks() {
            localStorage.setItem('contentTasks', JSON.stringify(tasks));
        }

        // --- MÓDULO: GUIONES Y CALENDARIO (MANTENIDOS) ---
        function guardarIdea() {
            const titulo = document.getElementById('ideaTitulo').value;
            if(!titulo) return alert('Título mandatorio.');
            const nuevaIdea = {
                id: Date.now(),
                titulo,
                formato: document.getElementById('ideaFormato').value,
                tipo: document.getElementById('ideaTipo').value,
                objetivo: document.getElementById('ideaObjetivo').value,
                fecha: document.getElementById('ideaFecha').value,
                hora: document.getElementById('ideaHora').value,
                guion: document.getElementById('ideaGuion').value,
                copy: document.getElementById('ideaCopy').value,
                hashtags: document.getElementById('ideaHashtags').value
            };
            ideas.push(nuevaIdea);
            localStorage.setItem('contentIdeas', JSON.stringify(ideas));
            renderIdeas();
            alert('Guion guardado');
        }

        function renderIdeas() {
            const container = document.getElementById('listaIdeas');
            container.innerHTML = '';
            [...ideas].reverse().forEach(idea => {
                container.innerHTML += `
                    <div class="bg-white p-5 rounded-lg shadow-sm border border-gray-200">
                        <div class="flex justify-between mb-2">
                            <h3 class="text-xl font-bold">${idea.titulo}</h3>
                            <button onclick="eliminarIdea(${idea.id})" class="text-red-500 text-sm">Eliminar</button>
                        </div>
                        <p class="text-sm text-indigo-600 font-bold mb-2">${idea.formato} | ${idea.objetivo}</p>
                        <p class="text-gray-600 text-sm italic">${idea.guion.substring(0, 100)}...</p>
                    </div>
                `;
            });
        }

        function eliminarIdea(id) {
            ideas = ideas.filter(i => i.id !== id);
            localStorage.setItem('contentIdeas', JSON.stringify(ideas));
            renderIdeas();
        }

        function renderCalendario() {
            const container = document.getElementById('calendarioGrid');
            container.innerHTML = '';
            const programadas = ideas.filter(i => i.fecha).sort((a, b) => new Date(a.fecha) - new Date(b.fecha));
            if (programadas.length === 0) {
                container.innerHTML = '<p class="text-gray-500 text-center py-4">Sin publicaciones agendadas.</p>';
                return;
            }
            programadas.forEach(idea => {
                container.innerHTML += `
                    <div class="flex items-center gap-4 bg-slate-50 p-3 rounded border">
                        <div class="w-24 text-sm font-bold text-gray-500">${idea.fecha}</div>
                        <div class="flex-1 font-medium text-gray-800">${idea.titulo}</div>
                        <div class="text-xs bg-indigo-100 p-1 rounded">${idea.formato}</div>
                    </div>
                `;
            });
        }

        // --- INICIALIZACIÓN ---
        window.onload = () => {
            document.getElementById('temaCentral').value = localStorage.getItem('temaCentral') || '';
            initArquetipos();
            renderTags('listaEjes', ejesTags, 'ejesTags');
            renderTags('listaPilares', pilaresTags, 'pilaresTags');
            setupTagsInput('inputEjes', 'listaEjes', ejesTags, 'ejesTags');
            setupTagsInput('inputPilares', 'listaPilares', pilaresTags, 'pilaresTags');
            renderTasks();
        };
    </script>
</body>
</html>
